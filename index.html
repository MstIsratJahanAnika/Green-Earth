<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="shortcut icon" href="./assets/favicon-leaf.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/style.css">
</head>

<body class="bg-[#DCFCE7]">

    <main>
        <h1 class="font-semibold text-[32px] text-center">Choose Your Trees</h1>

        <section class="grid grid-cols-12 gap-7.5 min-h-screen">

            <!-- categories div -->
            <div class="bg-[#DCFCE7] card card-body shadow-sm col-span-3 text-center ">
                <h2 class="font-semibold text-[20px]">Categories</h2>
                <!-- <div class="sticky top-2"> -->
                    <div class="sticky top-4">
                        <button id="allTreesBtn" class="btn btn-active bg-[#15803D] text-white w-full">All
                            Trees</button>
                        <div id="Categories-container">
                            <!-- all categories will load here dynamically  -->
                        </div>
                    </div>
                <!-- </div> -->
            </div>

            <!-- all trees div -->
            <div class="bg-[#DCFCE7] col-span-6">
                <div id="trees-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-7.5">

                    <!-- cards dynamically added here -->
                </div>

                <!-- loading spinner -->
                <div id="loading-spinner" class="h-[60vh] hidden justify-center items-center">
                    <span class="loading loading-spinner loading-xl"></span>
                </div>
            </div>

            <!-- add to cart div -->
            <div id="cart-container" class="space-y-4 col-span-3">
                <!-- <div class="sticky top-4"> -->
                    <div class="bg-white card card-body shadow ">
                        <h2 class="font-semibold text-[20px]">Your Cart</h2>

                        <!-- cart items -->
                        <div id="cart-items" class="space-y-4">
                            <!-- <div class="card card-body shadow-sm bg-slate-100">
                            <div class="flex justify-between items-center">
                                <div>
                                    <h3>Name</h3>
                                    <p>$2000 x 2</p>
                                </div>
                                <button class="btn btn-ghost text-[#1F2937]/30">✕</button>
                            </div>
                            <p class="text-right font-semibold text-xl">$500</p>
                        </div> -->
                        </div>

                        <!-- empty cart -->
                        <div id="empty-cart" class="text-center py-4">
                            <p class="text-[16px] text-[#1F2937]/50 font-semibold">Your Cart is Empty</p>
                            <p class="text-[16px] text-[#1F2937]/50 font-semibold">Add Trees to Get Started</p>
                        </div>

                        <!-- total amount -->
                        <div class="flex justify-between items-center bg-green-50 rounded-lg p-4 my-3 font-bold">
                            <span>Total: </span>
                            <span id="total-price">$0</span>
                        </div>
                    </div>
                <!-- </div> -->
            </div>
            </div>
        </section>

        <!-- card modal -->
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="card_detail_modal.showModal()">open modal</button> -->
        <dialog id="card_detail_modal" class="modal">
            <div class="modal-box">

                <!-- modal header with close button  -->
                <div class="flex justify-between items-start mb-4">
                    <h3 id="modal-title" class="font-bold text-2xl text-[#15803D]">Tree Details</h3>
                    <button class="btn btn-sm btn-circle btn-ghost"
                        onclick="document.getElementById('card_detail_modal').close()">✕</button>

                </div>

                <!-- modal content -->
                <div class="gap-6">
                    <!-- plant image -->
                    <img id="modalImage" src="" alt="plant" class="w-full h-[250px] object-cover rounded-2xl mb-12">

                    <!-- plant details -->
                    <div>
                        <p class="text-sm text-gray-500 mb-2">
                            <span class="font-bold">Category: </span>
                            <span id="modal-category"
                                class="badge badge-soft text-[#15803D] border-none bg-[#DCFCE7]"></span>
                        </p>

                        <p class="text-sm text-gray-600 mb-4">
                            <span id="modal-description"></span>
                        </p>
                        <div class="flex items-baseline gap-2 mb-6">
                            <span class="text-3xl font-bold text-[#15803D]">$<span id="modal-price">0</span></span>

                        </div>
                    </div>

                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn">Close</button>
                    </form>
                </div>
            </div>
        </dialog>
    </main>


    <!-- script -->
    <script src="./scripts/index.js"></script>
</body>

</html>
