<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./styles/style.css">
</head>

<body>

    <main class="">
        <h1 class="font-semibold text-[32px] text-center">Choose Your Trees</h1>

        <section class="grid grid-cols-12 gap-7.5">

            <!-- categories div -->
            <div class="bg-[#DCFCE7] card card-body shadow-sm col-span-3 text-center">
                <h2>Categories</h2>
                <div>
                    <button id="allTreesBtn" class="btn btn-active bg-[#15803D] text-white w-full">All Trees</button>

                    <div id="Categories-container">
                        <!-- all categories will load here dynamically  -->
                    </div>
                </div>
            </div>

            <!-- all trees div -->
            <div class="bg-[#DCFCE7] col-span-6">
                <div id="trees-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-7.5">

                    <!-- cards dynamically added here -->
                </div>

                <!-- loading spinner -->
                <div id="loading-spinner" class="h-[60vh] hidden justify-center items-center">
                    <span class="loading loading-spinner loading-xl"></span>
                </div>
            </div>
            <div class="bg-green-400 col-span-3">
                cart
            </div>
        </section>
    </main>


    <!-- script -->
    <script src="./scripts/index.js"></script>
</body>

</html>
