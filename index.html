<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Earth</title>

    <!-- tailwind + daisyui -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="./styles/style.css">
</head>
<body>
    
    <main class="text-center">
        <h1 class="font-semibold text-[32px]">Choose Your Trees</h1>

        <section class="grid grid-cols-12 gap-7.5">

            <!-- categories div -->
            <div class="bg-[#DCFCE7] card card-body shadow-sm col-span-3">
                <h2>Categories</h2>
                <div>
                    <button id="allTreesBtn" class="btn btn-active btn-success w-full">Success</button>

                    <div id="Categories-container">
                        <!-- all categories will load here dynamically  -->
                    </div>
                </div>
            </div>
            <div class="bg-blue-400 col-span-6">Trees</div>
            <div class="bg-green-400 col-span-3">cart</div>
        </section>
    </main>


    <!-- script -->
     <script src="./scripts/index.js"></script>
</body>
</html>
